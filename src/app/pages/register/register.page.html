<ion-header class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>Registro</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="form-container">
    
    <ion-list lines="none">
      
      <ion-item class="custom-item">
        <ion-icon name="person-outline" slot="start" color="medium"></ion-icon>
        <ion-input
          label="Nombres"
          labelPlacement="floating"
          [(ngModel)]="nombres"
          placeholder="Ingresa tus nombres">
        </ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-icon name="at-outline" slot="start" color="medium"></ion-icon>
        <ion-input
          label="Nickname"
          labelPlacement="floating"
          [(ngModel)]="nickname"
          placeholder="Ej. user-123">
        </ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-icon name="mail-outline" slot="start" color="medium"></ion-icon>
        <ion-input
          label="Correo Electrónico"
          labelPlacement="floating"
          type="email"
          [(ngModel)]="email"
          placeholder="usuario@ejemplo.com">
        </ion-input>
      </ion-item>

      <ion-item class="custom-item">
        <ion-icon name="lock-closed-outline" slot="start" color="medium"></ion-icon>
        <ion-input
          label="Contraseña"
          labelPlacement="floating"
          type="password"
          [(ngModel)]="password"
          placeholder="••••••••">
        </ion-input>
      </ion-item>

    </ion-list>

    <div class="ion-margin-top">
      <ion-button expand="block" shape="round" color="primary" (click)="register()">
        <ion-icon name="person-add-outline" slot="start"></ion-icon>
        Registrarse
      </ion-button>
    </div>

    <div class="ion-text-center ion-margin-top">
      <p>¿Ya tienes una cuenta? <a routerLink="/login" class="link">Inicia sesión</a></p>
    </div>

  </div>
</ion-content>
